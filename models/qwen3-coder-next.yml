# Qwen3-Coder-Next family - Configurations optimisées Blackwell GB10
# Usage: MODEL=qwen3-coder-next VARIANT=fp8|nvfp4|mxfp4

defaults:
  description: Code generation and analysis (Qwen3-Coder-Next family)
  env:
    # Base optimizations
    SAFETENSORS_FAST_GPU: "1"
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
    
    # DeepGemm Blackwell (commun à tous)
    # VLLM_USE_DEEP_GEMM: "1"
    # VLLM_USE_DEEP_GEMM_E8M0: "1"
    # VLLM_USE_DEEP_GEMM_TMA_ALIGNED_SCALES: "1"
    # VLLM_DEEP_GEMM_WARMUP: "relax"
    
    # MoE base optimizations (commun à tous)
    # VLLM_MOE_USE_DEEP_GEMM: "1"
    # VLLM_FLASHINFER_MOE_BACKEND: "latency"
    # VLLM_USE_FUSED_MOE_GROUPED_TOPK: "1"
    # VLLM_ENABLE_FUSED_MOE_ACTIVATION_CHUNKING: "1"
    # VLLM_ENABLE_MOE_DP_CHUNK: "1"
    # VLLM_FUSED_MOE_CHUNK_SIZE: "16384"
    # VLLM_MOE_DP_CHUNK_SIZE: "256"
    
    # FlashInfer workspace
    # VLLM_FLASHINFER_WORKSPACE_BUFFER_SIZE: "394264576"
    # VLLM_HAS_FLASHINFER_CUBIN: "0"
    
    # Compilation
    # VLLM_USE_AOT_COMPILE: "0"
    # VLLM_DISABLE_COMPILE_CACHE: "0"
    # VLLM_COMPILE_CACHE_SAVE_FORMAT: "binary"
    # VLLM_ENABLE_INDUCTOR_MAX_AUTOTUNE: "1"
    # VLLM_ENABLE_INDUCTOR_COORDINATE_DESCENT_TUNING: "1"
    
    # Communication
    # VLLM_USE_NCCL_SYMM_MEM: "1"
    # VLLM_ALLREDUCE_USE_SYMM_MEM: "1"
    
    # CUDA Graph
    VLLM_ENABLE_CUDAGRAPH_GC: "0"
    VLLM_CUDAGRAPH_MODE: "0"
    
    # KV Cache scaling (commun à tous)
    # Q_SCALE_CONSTANT: "200"
    # K_SCALE_CONSTANT: "200"
    # V_SCALE_CONSTANT: "100"
    # VLLM_KV_CACHE_LAYOUT: "NHD"
  
  litellm:
    temperature: 0.95
    top_p: 0.95
    top_k: 40
    repetition_penalty: 1.1
    max_tokens: 256k
    timeout: 45

variants:
  # ===================================================================
  # FP8 - Full precision FP8 (le plus rapide, meilleure qualité)
  # ===================================================================
  fp8:
    command: |
      vllm serve unsloth/Qwen3-Coder-Next-FP8-Dynamic \
        --tokenizer-mode auto \
        --enable-auto-tool-choice \
        --tool-call-parser qwen3_xml \
        --load-format fastsafetensors \
        --attention-backend flashinfer \
        --enable-prefix-caching \
        --enable-chunked-prefill \
        --kv-cache-dtype fp8 \
        --max-num-seqs 256
    env:
      # FP8 MoE kernels (FlashInfer optimisé)
      # VLLM_USE_FLASHINFER_MOE_FP8: "1"
      
      # FP8 block-scale GEMM (Blackwell natif)
      # VLLM_BLOCKSCALE_FP8_GEMM_FLASHINFER: "1"

  # ===================================================================
  # NVFP4 - Quantification 4-bit float NVIDIA (meilleur compromis)
  # ===================================================================
  nvfp4:
    command: |
      vllm serve txn545/Qwen3-Coder-Next-NVFP4 \
        --tokenizer-mode auto \
        --enable-auto-tool-choice \
        --tool-call-parser qwen3_xml \
        --load-format fastsafetensors \
        --attention-backend flashinfer \
        --enable-prefix-caching \
        --enable-chunked-prefill \
        --kv-cache-dtype fp8 \
        --max-num-seqs 256
    env:
      # Backends Blackwell NVFP4 (natif)
      # VLLM_DEEPEPLL_NVFP4_DISPATCH: "1"
      VLLM_NVFP4_GEMM_BACKEND: "flashinfer-cutlass"
      
      # FlashInfer MoE FP4
      # VLLM_USE_FLASHINFER_MOE_FP4: "1"
      # VLLM_MAX_TOKENS_PER_EXPERT_FP4_MOE: "163840"

  # ===================================================================
  # MXFP4 - Quantification 4-bit float AMD/Mixed (économie mémoire max)
  # ===================================================================
  mxfp4:
    command: |
      vllm serve amd/Qwen3-Coder-Next-MXFP4 \
        --tokenizer-mode auto \
        --enable-auto-tool-choice \
        --tool-call-parser qwen3_xml \
        --load-format fastsafetensors \
        --attention-backend flashinfer \
        --enable-prefix-caching \
        --enable-chunked-prefill \
        --kv-cache-dtype fp8 \
        --max-num-seqs 256
    env:
      # MXFP4 peut utiliser Marlin kernel sur Blackwell
      VLLM_MXFP4_USE_MARLIN: "1"
      
      # FlashInfer MoE avec support MXFP4
      VLLM_USE_FLASHINFER_MOE_MXFP4_BF16: "1"
      VLLM_USE_FLASHINFER_MOE_INT4: "1"
      
      # Alternative: Si MXFP4 compatible avec NVFP4 backend
      VLLM_NVFP4_GEMM_BACKEND: "flashinfer-cutlass"
      VLLM_USE_FLASHINFER_MOE_FP4: "1"
      
      # Chunk size légèrement réduit pour MXFP4
      VLLM_FUSED_MOE_CHUNK_SIZE: "12288"
      VLLM_MAX_TOKENS_PER_EXPERT_FP4_MOE: "122880"
