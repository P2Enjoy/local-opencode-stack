# VLLM Model Serving Configurations
# Each model maps to a complete vllm serve command with all parameters
# The run_vllm_agent.sh script reads MODEL from vars.env and executes the corresponding command

glm47-flash: >
  vllm serve QuantTrio/GLM-4.7-Flash-AWQ
  --port 8000
  --host 0.0.0.0
  --api-key sk-FAKE
  --gpu-memory-utilization 0.92
  --max-model-len 65536
  --trust-remote-code
  --tool-call-parser glm47
  --reasoning-parser glm45
  --enable-auto-tool-choice
  --served-model-name vllm_agent
  --max-num-batched-tokens 16384
  --max-num-seqs 128
  --load-format fastsafetensors
  --kv-cache-dtype fp8

