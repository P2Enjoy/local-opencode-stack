# VLLM Model Serving Configurations
# Each model specifies:
# - command: the vllm serve command with model-specific parameters
# - env: model-specific environment variables (augments/overrides global vars from vars.env)
# - litellm: LiteLLM inference parameters (augments/overrides global defaults from vars.env)
# Note: All variables from vars.env are exported globally for every execution
# Note: LiteLLM config is generated at runtime from defaults + per-model overrides

glm47-flash:
  command: |
    vllm serve QuantTrio/GLM-4.7-Flash-AWQ \
      --max-model-len 16384 \
      --trust-remote-code \
      --tool-call-parser glm47 \
      --reasoning-parser glm45 \
      --enable-auto-tool-choice \
      --max-num-batched-tokens 16384 \
      --max-num-seqs 128 \
      --load-format fastsafetensors \
      --kv-cache-dtype fp8
  env:
    VLLM_USE_DEEP_GEMM: "0"
    VLLM_USE_FLASHINFER_MOE_FP8: "1"
    VLLM_MLA_DISABLE: "1"
    # VLLM_USE_FLASHINFER_SAMPLER: "0"
    # OMP_NUM_THREADS: "4"
  litellm:
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repetition_penalty: 1.05
    max_tokens: 8192

# HCSW is for HIGH CONCURRENCY SMALL WINDOW
step-3.5-flash-HCSW:
  command: |
    vllm serve stepfun-ai/Step-3.5-Flash-FP8 \
      --reasoning-parser step3p5 \
      --enable-auto-tool-choice \
      --tool-call-parser step3p5 \
      --trust-remote-code \
      --quantization fp8 \
      --kv-cache-dtype fp8 \
      --max-model-len 8192 \
      --gpu-memory-utilization 0.95 \
      --max-num-seqs 64 \
      --max-num-batched-tokens 16384 \
      --block-size 16 \
      --enable-chunked-prefill \
      --max-num-partial-prefills 4 \
      --max-long-partial-prefills 2 \
      --speculative_config '{"method":"step3p5_mtp","num_speculative_tokens":1}' \
      --load-format fastsafetensors
  env:
    VLLM_USE_FLASHINFER_MOE_FP8: 1
    VLLM_ATTENTION_BACKEND: FLASH_ATTN
    VLLM_FLASHINFER_MOE_BACKEND: latency
    VLLM_USE_DEEP_GEMM: "0"
    # VLLM_BLOCKSCALE_FP8_GEMM_FLASHINFER: 1
    # VLLM_USE_FLASHINFER_MOE_FP16: "1"
    # VLLM_USE_FLASHINFER_SAMPLER: "0"
    # OMP_NUM_THREADS: "4"
  litellm:
    max_tokens: 8192

