services:
  vllm-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vllm-container
    restart: unless-stopped

    ports:
      - "8000:8000"

    gpus: all

    env_file:
      - ./vars.env

    volumes:
      - /home/you/.cache/huggingface:/root/.cache/huggingface
      - ./run_vllm_agent.sh:/app/run_vllm_agent.sh:ro
      - ./models.yml:/app/models.yml:ro
      - ./vars.env:/app/vars.env:ro
      - ./generate_litellm_config.py:/app/generate_litellm_config.py:ro
      - ./litellm_config.template.yaml:/app/litellm_config.template.yaml:ro
      - litellm_config:/app/generated_configs

    command: bash /app/run_vllm_agent.sh

    healthcheck:
      test: ["CMD-SHELL", "test -f /app/generated_configs/config.yaml && curl -s -H 'Authorization: Bearer sk-FAKE' http://localhost:8000/v1/models | grep -q vllm_agent || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 150s

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config=/app/generated_configs/config.yaml"]
    container_name: litellm
    restart: unless-stopped

    volumes:
      - litellm_config:/app/generated_configs

    ports:
      - "4000:4000"

    env_file:
      - ./vars.env

    depends_on:
      db:
        condition: service_healthy
      vllm-node:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 http://localhost:4000/health/liveliness || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 30s

  db:
    image: postgres:16
    restart: always
    container_name: litellm_db

    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: dbpassword9090

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 1s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: litellm_postgres_data
  litellm_config:
    name: litellm_config
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
